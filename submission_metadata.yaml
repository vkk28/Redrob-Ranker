  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini 3.5 Flash for code generation and review. No candidate data was sent to any LLM APIs during Phase 2 ranking.

methodology_summary: |
  2-Phase Retrieve-and-Rerank architecture. Retrieves top 4,000 candidates using dense BGE embeddings (HNSW index). Applies hard gates to filter honeypots, WITCH consulting, and title mismatch. Combines Core Fit (production system experience), Logistics, Education, and behavioral multipliers. Reranks top 200 via cached local Cross-Encoder. Deduplicates and force-includes Tier-5 candidates in final 100 with monotonic score reconciliation. Complete CPU run takes under 30s.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
