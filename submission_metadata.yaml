ai_usage_summary: |
  Used Gemini 3.5 Flash for code generation and review. No candidate data was sent to any LLM APIs during Phase 2 ranking.

methodology_summary: |
  2-Phase Retrieve-and-Rerank architecture. Retrieves top 4,000 candidates using dense BGE embeddings (HNSW index). Applies hard gates to filter honeypots (including fictional company detection), WITCH consulting, and title mismatch. Combines Core Fit 55%, Logistics 25%, Education 20% (calibrated weights) with behavioral multipliers. Reranks top 200 via cached local Cross-Encoder. Force-includes Tier-5 hidden-gem candidates. Generates rank-aware, candidate-specific reasoning with varied vocabulary. Complete CPU run takes under 20s.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
